# Cloudbase configuration
# This file is copied to ~/.cloudbase/config.yaml on first run.
# Edit that file — it will be preserved across Cloudbase updates.

server:
  # Port Cloudbase listens on
  port: 7823


auth:
  # How long a login session (JWT) is valid, in seconds.
  # 3600 = 1 hour, 86400 = 1 day, 604800 = 1 week
  token_expire_seconds: 3600


ports:
  # Host port range assigned to app instances (Docker external ports)
  # Must have at least as many ports as limits.max_instances
  instance_min: 10000
  instance_max: 19999

  # Port range for reverse tunnels (remote node → primary)
  tunnel_min: 20000
  tunnel_max: 29999

limits:
  # Maximum number of apps that can be deployed
  max_apps: 1000

  # Maximum total number of instances (replicas) across all apps and nodes
  max_instances: 10000

  # Maximum number of nodes (primary + remote) that can be registered
  max_nodes: 100

  # Restart-loop protection: max restarts per window per app
  max_restarts_per_window: 5
  restart_window_seconds: 60
